package configReader;

import java.io.FileInputStream;
import java.io.IOException;
import java.util.Properties;

public class ObjectReader {
	
	// Creating a properties object to hold the data
	Properties pro = null;

	public ObjectReader() throws IOException {
		pro = new Properties();
		
		// This points to the file we just edited to read the keys
		FileInputStream fis = new FileInputStream("./Object Repository/objects.properties");
		pro.load(fis);
	}
	
	// General method to get any value if we provide the key
	public String getURL(String key) {
		return pro.getProperty(key);
	}
	
	// Method to update or set a value in the properties object
	public void setURL(String key, String url) {
		pro.setProperty(key, url);
	}
	
	// Getting the specific ID for the search box
	public String getSearchBoxId() {
		return pro.getProperty("homepage.searchBox.id");
	}
	
	// Getting the class name for the sort dropdown
	public String getSortByClass() {
		return pro.getProperty("productPage.sortBy.class");
	}
	
	// Returns the folder path for saving screenshots
	public String getScreenshotPath() {
		return pro.getProperty("screenShotPath");
	}
	
	// Returns the location of our Excel data sheet
	public String getExcelPath() {
		return pro.getProperty("excelPath");
	}
	
	// Returns the path where the HTML report will be generated
	public String getReportsPath() {
		return pro.getProperty("reportsPath");
	}
}