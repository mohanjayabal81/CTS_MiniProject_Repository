# The entry point for the automation suite
BaseUrl=https://www.flipkart.com/
expectedUrl=https://www.flipkart.com/


# The main search container/input trigger
searchBox=//input[@class='nw1UBF v1zwn25']

# The actual input field where text is typed
inputText=//input[@id='input-searchsearchpage-input']

# Recommendation/Auto-suggestion item for the specific query
MobileUnder15000Xpath=//div[normalize-space()='mobiles under 15000']

# Validation point to ensure the search results page loaded correctly
searchTextVerify=//span[normalize-space()='mobiles under 15000']
expected_search_Verify_Text=mobiles under 15000


# Breadcrumb or Category link to narrow down to 'Mobiles'
TodisplayFilters=//div[@class='pBPis1']//a[@class='GD4sye ECYCDD' or @title='Mobiles']

# The container for the Price range section
priceMaxFilter=//section[@class='XC54e7 vRd1kF']

# The 'Max' price dropdown (indexed at 2 to select the upper limit)
maxElement=(//select[@class='hbnjE2'])[2]


# Anchor element used to scroll the sidebar into view
scrollToOperatingSystem=//section[@class='XC54e7 vRd1kF']

# The header for the OS Version section
selectOsVersion=//section[@class='KNnSWQ vRd1kF']//div[@class='iCspr8 AF1m2F']//div[text()='Operating System Version Name']

# Clickable 'Show More' link to expand the list of OS versions
TovisibleMoreVersions=//div[@class='GN2Hca rQQNAD']//span[text()='12 MORE']

# Specific version used for scrolling down the list
scrollToMakePieVisible=//div[@title='Eclair']

# The final checkbox/filter for Android 'Pie'
versionPie=//div[@title='Pie']


# 'Newest First' sorting option header
newestArrivalPath=//div[@class='lvJbLV']//div[@class='s6YJlm']//div[text()='Newest First']


# Selectors for the very first item in the result list
firstMobileName=//div[@class='ZFwe0M row'][1]//div[@class='RG5Slk']
firstMobilePrice=//div[@class='ZFwe0M row'][1]//div[@class='hZ3P6w DeU9vF']

# Selectors to capture lists (Top 5 items) for data validation or reporting
getAllMobileNames=(//div[@class='ZFwe0M row']//div[@class='RG5Slk'])[position()<=5]
getAllMobilePrices=//div[@class='ZFwe0M row']//div[@class='hZ3P6w DeU9vF'][position()<=5]


# Local directory path for saving failure or milestone screenshots
screenshotLocation=Screenshots