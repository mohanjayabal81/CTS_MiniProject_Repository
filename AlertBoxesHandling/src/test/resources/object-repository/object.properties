# Application under test URL
BaseUrl=https://demo.automationtesting.in/Alerts.html


# Link text for SwitchTo dropdown menu
Alerts.switchToMenu.linkText=SwitchTo
# XPath for Alerts option inside SwitchTo dropdown
Alerts.alertsOption.xpath=//a[contains(text(),'Alerts')]


# Link text for simple alert tab
Alerts.alertTab.linkText=Alert with OK
# XPath for simple alert trigger button
Alerts.alertBtn.xpath=(//button[contains(normalize-space(),'click the button to display an alert box')])[1]

# Link text for confirm alert tab
Alerts.confirmTab.linkText=Alert with OK & Cancel
# XPath for confirm alert trigger button
Alerts.confirmBtn.xpath=(//button[contains(normalize-space(),'click the button to display a confirm box')])[1]


# Link text for prompt alert tab
Alerts.promptTab.linkText=Alert with Textbox
# XPath for prompt alert trigger button
Alerts.promptBtn.xpath=(//button[contains(normalize-space(),'click the button to demonstrate the prompt box')])[1]


# Element ID for prompt result message
Alerts.resultMsg.id=demo1
# Element ID for confirm result message
Alerts.confirmMsg.id=demo


# Name to input in prompt box during test
Alerts.prompt.inputName=Vaibhav