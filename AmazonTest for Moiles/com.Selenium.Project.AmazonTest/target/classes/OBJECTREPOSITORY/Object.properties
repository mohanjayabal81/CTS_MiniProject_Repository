# The root URL of the Amazon India website
BaseUrl=https://www.amazon.in/

# Expected browser title of the Amazon homepage (used for page load validation)
HomePageTitle=Online Shopping site in India: Shop Online for Mobiles, Books, Watches, Shoes and More - Amazon.in

# ID of the search input text box on the Amazon homepage/nav bar
Amazon.Search.id=twotabsearchtextbox

# ID of the search submit button (magnifying glass icon)
Amazon.SearchButton.id=nav-search-submit-button

# Search keyword to be entered in the search box
Amazon.Search.Key=mobile smartphones under 30000


# XPath to locate the "Results" heading on the search results page
Amazon.SearchPage.ResultText.xpath=//div[@class='a-section a-spacing-none s-messaging-widget-results-header']//h2[text()='Results']

# Expected text of the results heading (used for assertion)
Amazon.SearchPage.ResultText=Results

# XPath to retrieve the current value inside the search box on the results page
Amazon.SearchPage.SearchBoxValue.xpath=//input[@id='twotabsearchtextbox']

# XPath to locate result count/description text
Amazon.SearchPage.validateText.xpath=//div[contains(@class,'s-desktop-toolbar')]//div[contains(@class,'a-section')]//span[contains(text(),'results for')]

# Regex pattern to validate the result count text format
Amazon.SearchPage.validateText.regex=(\d+)-(\d+) of (\d+) results for "%s"


# XPath to locate and click the "Sort by:" dropdown button on the search results page
Amazon.SearchPage.Sortlist.xpath=//span[contains(@class,'a-button-text') and .//span[@class='a-dropdown-label'][text()='Sort by:']]

# ID of the "Newest Arrivals" option within the Sort By dropdown list
Amazon.Searchpage.Sortlist.newestArrival.id=s-result-sort-select_4

# XPath to verify the currently selected sort option displayed in the dropdown
Amazon.SearchPage.Sortlist.resultVerify.xpath=//span[@class='a-dropdown-prompt']

# Expected text of the selected sort option after choosing "Newest Arrivals"
Amazon.SearchPage.Sortlist.resultVerify.text=Newest Arrivals


# XPath to locate all individual product cards on the search results page
Amazon.SearchPage.SearchResult.xpath=//div[@data-component-type='s-search-result']

# XPath (relative to a result card) to detect if a product is a sponsored listing
Amazon.SearchPage.SponsoredLabel.xpath=.//span[contains(@class,'puis-sponsored-label-text')]

# XPath (relative to a result card) to extract the product name
Amazon.SearchPage.ProductName.xpath=.//h2[@class='a-size-medium a-spacing-none a-color-base a-text-normal']/span

# XPath (relative to a result card) to extract the whole number part of the product price
Amazon.SearchPage.ProductPrice.xpath=.//span[@class='a-price-whole']

# Prefix symbol prepended to the extracted price value for display purposes
Amazon.SearchPage.ProductPrice.prefix=\u20B9

# Fallback text displayed when a product does not have a listed price
Amazon.SearchPage.ProductPrice.fallback=Price not listed

# Maximum number of top products to collect from the search results
Amazon.SearchPage.TopProducts.count=5


# Absolute file system path where test failure/step screenshots will be saved
Amazon.ScreenShot.path=C:\\Users\\2479744\\eclipse-workspace\\com.Selenium.Project.AmazonTest\\ScreenShots\\