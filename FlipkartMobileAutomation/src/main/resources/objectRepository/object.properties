# Flipkart base URL
baseUrl=https://www.flipkart.com/


# Popup close button (x) on login dialog
popupCloseButton=//span[text()='\u2715']


# Main search input box
searchBox=//input[@name='q']

# "mobiles under 15000" auto-suggestion option

mobilesUnder15000=//span[text()='mobiles under 15000']

# update this to whatever exact text appears in the dropdown
#mobilesUnder15000=//li[contains(@class,'suggest')]//span[contains(text(),'mobiles under 15000')]

# Result label used to verify search loaded correctly
searchResultVerify=//span[@class='_Omnvo']


# --- Filters Panel ---
# Button to open the filter section
displayFilters=//div[@class='pBPis1']//a[@class='GD4sye ECYCDD' or @title='Mobiles']

# Price range section \u2014 scrolled to before setting max price
priceRangeSection=//section[@class='XC54e7 vRd1kF']

# Max price dropdown (2nd instance on page)
maxPriceDropdown=(//select[@class='hbnjE2'])[2]

# OS section scroll reference (anchored to Screen Size label)
operatingSystemSection=//section[@class='KNnSWQ vRd1kF']//div[@class='iCspr8 AF1m2F']//div[text()='Screen Size']

# OS Version Name heading \u2014 click to expand the version list
osVersionHeading=//section[@class='KNnSWQ vRd1kF']//div[@class='iCspr8 AF1m2F']//div[text()='Operating System Version Name']

# MORE button to show all OS versions
showMoreOsVersions=//div[@class='GN2Hca rQQNAD']//span[text()='12 MORE']

# Eclair element used to scroll Pie into view
scrollToPieReference=//div[@title='Eclair']

# Pie OS version checkbox
pieVersion=//div[@title='Pie']
